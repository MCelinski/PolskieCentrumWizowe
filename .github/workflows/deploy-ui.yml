name: Deploy UI to CyberFolks

on:
  push:
    branches: [master]
    paths-ignore:
      - "mail-api/**"
      - "DEPLOYMENT.md"
      - "CYBERFOLKS_MAIL_SETUP.md"
      - "MAIL_SETUP.md"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: cyberfolks-ui-production
  cancel-in-progress: true

jobs:
  deploy-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate UI production config
        run: |
          test -n "${NEXT_PUBLIC_API_URL}" || (echo "Missing NEXT_PUBLIC_API_URL secret" && exit 1)
          test -n "${FRONTEND_PATH}" || (echo "Missing FRONTEND_PATH secret" && exit 1)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          FRONTEND_PATH: ${{ secrets.FRONTEND_PATH }}

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "out/*"
          target: ${{ secrets.FRONTEND_PATH }}
          strip_components: 1
          rm: true
