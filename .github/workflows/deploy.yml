name: Deploy to CyberFolks

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: cyberfolks-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate production config
        run: |
          test -n "${NEXT_PUBLIC_API_URL}" || (echo "Missing NEXT_PUBLIC_API_URL secret" && exit 1)
          test -n "${FRONTEND_PATH}" || (echo "Missing FRONTEND_PATH secret" && exit 1)
          test -n "${API_PATH}" || (echo "Missing API_PATH secret" && exit 1)
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          FRONTEND_PATH: ${{ secrets.FRONTEND_PATH }}
          API_PATH: ${{ secrets.API_PATH }}

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "out/*"
          target: ${{ secrets.FRONTEND_PATH }}
          strip_components: 1
          rm: true

      - name: Upload API files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "mail-api/*"
          target: "${{ secrets.API_PATH }}/_incoming"
          strip_components: 1
          rm: true

      - name: Install API dependencies and restart Passenger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cd ${{ secrets.API_PATH }}
            if [ ! -d _incoming ]; then
              echo "Missing _incoming API upload"
              exit 1
            fi

            INSTALL_DEPS=1
            if [ -d node_modules ] && [ -f package-lock.json ] && cmp -s package-lock.json _incoming/package-lock.json; then
              INSTALL_DEPS=0
            fi

            find . -mindepth 1 -maxdepth 1 \
              ! -name ".env" \
              ! -name "node_modules" \
              ! -name "tmp" \
              ! -name "_incoming" \
              -exec rm -rf {} +

            cp -R _incoming/. .
            rm -rf _incoming

            if [ ! -f .env ]; then
              echo "Missing API .env file in ${{ secrets.API_PATH }}"
              exit 1
            fi

            if [ "$INSTALL_DEPS" = "1" ]; then
              npm ci --omit=dev
            else
              echo "API dependencies unchanged"
            fi

            mkdir -p tmp
            touch tmp/restart.txt

            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Deploy OK"
