<svg viewBox="0 0 308 44" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Polskie Centrum Wizowe">

  <defs>
    <clipPath id="globe-mask">
      <circle cx="22" cy="22" r="17"/>
    </clipPath>
  </defs>

  <!-- Globe internals (clipped to circle) -->
  <g clip-path="url(#globe-mask)" fill="none" stroke="#2B2F36" stroke-linecap="round">
    <!-- Equator -->
    <line x1="5" y1="22" x2="39" y2="22" stroke-width="1.25"/>
    <!-- Central meridian -->
    <line x1="22" y1="5" x2="22" y2="39" stroke-width="1.25"/>
    <!-- Left oval meridian -->
    <path d="M22,5 A11,17 0 0 0 22,39" stroke-width="1"/>
    <!-- Right oval meridian -->
    <path d="M22,5 A11,17 0 0 1 22,39" stroke-width="1"/>
    <!-- Upper latitude -->
    <line x1="5" y1="14.5" x2="39" y2="14.5" stroke-width="0.85"/>
    <!-- Lower latitude -->
    <line x1="5" y1="29.5" x2="39" y2="29.5" stroke-width="0.85"/>
  </g>

  <!-- Globe outer circle -->
  <circle cx="22" cy="22" r="17" fill="none" stroke="#2B2F36" stroke-width="1.75"/>

  <!-- Red accent bar below icon -->
  <rect x="5" y="41" width="34" height="2" rx="1" fill="#8B1E1E"/>

  <!-- Divider -->
  <line x1="45" y1="10" x2="45" y2="34" stroke="#D8D5D0" stroke-width="0.85"/>

  <!-- Wordmark -->
  <text
    x="53" y="27"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="14.5"
    font-weight="600"
    fill="#1A1A1A"
    letter-spacing="2"
  >POLSKIE CENTRUM WIZOWE</text>

</svg>
